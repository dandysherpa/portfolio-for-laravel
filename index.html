<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'DM Sans', sans-serif; background-color: #0a0a0a; }
        h1, nav .brand { font-family: 'Syne', sans-serif; }
    </style>
</head>
<body class="text-white min-h-screen">

    <header>
        <nav class="container flex justify-between items-center text-white py-5">
            <!-- Brand -->
            <div class="brand">
                <h1 class="text-[60px] font-bold cursor-pointer">PORT <span class="text-[#ff5a30]">folio</span></h1>
            </div>

            <!-- Desktop links -->
            <div class="hidden md:flex gap-8 text-sm tracking-wide">
                <a href="#" class="hover:text-[#ff5a30] transition-colors duration-200">Home</a>
                <a href="#" class="hover:text-[#ff5a30] transition-colors duration-200">About</a>
                <a href="#" class="hover:text-[#ff5a30] transition-colors duration-200">Projects</a>
                <a href="#" class="hover:text-[#ff5a30] transition-colors duration-200">Contact</a>
            </div>

            <!-- Mobile hamburger -->
            <button
                class="md:hidden flex flex-col gap-1.5 cursor-pointer"
                onclick="document.getElementById('mobile-menu').classList.toggle('hidden')">
                <span class="w-6 h-0.5 bg-white block"></span>
                <span class="w-6 h-0.5 bg-white block"></span>
                <span class="w-6 h-0.5 bg-white block"></span>
            </button>
        </nav>

        <!-- Mobile menu -->
        <div id="mobile-menu" class="hidden bg-black">
            <div class="container flex flex-col gap-4 py-4 text-sm font-bold">
                <a href="#" class="hover:text-[#ff5a30] transition-colors duration-200">Home</a>
                <a href="#" class="hover:text-[#ff5a30] transition-colors duration-200">About</a>
                <a href="#" class="hover:text-[#ff5a30] transition-colors duration-200">Projects</a>
                <a href="#" class="hover:text-[#ff5a30] transition-colors duration-200">Contact</a>
            </div>
        </div>
    </header>

    <main>
        <section class="container mt-16 flex flex-col-reverse md:flex-row items-center gap-12">

            <!-- Text -->
            <div class="flex-1 text-center md:text-left">
                <!-- Heading -->
                <h1 class="text-4xl sm:text-5xl lg:text-6xl font-bold leading-tight tracking-tight text-white mb-6">
                    Hi, I'm<br>
                    <span class="text-[#ff5a30]">Dandy Sherpa.</span><br>
                    <span class="text-white/60 text-5xl sm:text-4xl font-bold">Junior Full-Stack Dev.</span>
                </h1>

                <!-- Description -->
                <p class="text-white/55 text-base sm:text-lg font-light leading-relaxed mb-8 max-w-md mx-auto md:mx-0">
                    I love building intuitive web applications, solving problems, and turning ideas into functional, user-friendly experiences with Laravel and modern web technologies.
                </p>

                <!-- Button -->
                <button
                    type="button"
                    class="inline-flex items-center gap-2 px-6 py-3 border border-[#ff5a30] text-[#ff5a30] rounded text-sm cursor-pointer transition-all duration-200 hover:bg-[#ff5a30] hover:text-white group">
                    Read more
                    <svg class="w-3.5 h-3.5 transition-transform duration-200 group-hover:translate-x-1" viewBox="0 0 14 14" fill="none">
                        <path d="M2 7h10M8 3l4 4-4 4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
            </div>

            <!-- Image -->
            <div class="relative w-56 h-72 sm:w-64 sm:h-80 shrink-0">
                <div class="absolute -bottom-2 -right-2 w-full h-full rounded-xl border border-[#ff5a30]"></div>
                <div class="absolute inset-0 rounded-xl border border-white/10 overflow-hidden bg-neutral-800">
                    <img
                        src="/images/DSC01049-removebg-preview.png"
                        alt="Dandy Sherpa"
                        class="w-full h-full object-cover object-top"
                    />
                </div>
            </div>

        </section>
    </main>

    <footer></footer>

</body>
</html>
